<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="cam.png" type="image/x-icon">
    <title>aula imagens</title>
</head>
<body>
    <h1>desafio das imagens</h1>
    <h2>Nome da minha cidade é VILA VELHA-ES</h2>
    <img src="vila velha.jpg" width="40%" alt="foto cidade Vila Velha-ES">
    <hr>
    <h2>Outra foto da minha cidade VILHA VELHA-ES, agora com legenda</h2>

    <figure>
        <img src="vilavelhaes.jpg" width="40%" height="500px" alt="imagem ceu">
        <figcaption> Legenda foto ceu em Vila Velha
        </figcaption>
    </figure>
    <hr>
    <h2>Outra foto da minha cidade Vila Velha-ES agora com alteração de tamanho</h2>
<picture>
    <source media="(max-width: 760px)" srcset="vilavelhaimg2.jpg" sizes="500px">
    <img src="vilavelhaimg3.jpg" width="50%" height="500px" alt="Vila Velha tam G">
</picture>

</body>
</html>
